<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Crafting Table - Top view with grid -->
  <rect width="16" height="16" fill="#C4A060"/>
  <!-- Grid lines -->
  <line x1="5" y1="0" x2="5" y2="16" stroke="#6B4423" stroke-width="1"/>
  <line x1="11" y1="0" x2="11" y2="16" stroke="#6B4423" stroke-width="1"/>
  <line x1="0" y1="5" x2="16" y2="5" stroke="#6B4423" stroke-width="1"/>
  <line x1="0" y1="11" x2="16" y2="11" stroke="#6B4423" stroke-width="1"/>
  <!-- Tools on top -->
  <rect x="1" y="1" width="3" height="3" fill="#8B5A2B"/>
  <rect x="12" y="1" width="3" height="3" fill="#666"/>
</svg>
